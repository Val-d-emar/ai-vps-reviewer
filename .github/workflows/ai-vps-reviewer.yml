name: Gemini AI Code Reviewer

on:
  pull_request:
    types: [review_requested]

jobs:
  review-code:
    if: >
      github.event.requested_reviewer.login == 'ai-agent-net' && 
      github.actor.login == github.repository_owner.login
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      GITHUB_ACTOR_LOGIN: ${{ github.actor.login }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY_OWNER_LOGIN: ${{ github.repository_owner.login }}

    steps:
      - name: Test Gemini Review
        uses: Val-d-emar/ai-vps-reviewer@main
        with:
          github_token: ${{ secrets.AI_AGENT_PAT }}
          vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
          vps_target: ${{ secrets.VPS_TARGET }}
          agent_model: "flash"
          review_language: "Russian"
          approval_required: false
          comment_title: "# 🤖 Gemini AI Code Review"
