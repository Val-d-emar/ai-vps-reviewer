name: Gemini AI Code Reviewer

on:
  pull_request:
    types: [review_requested]

jobs:
  review-code:
    if: >
      github.event.requested_reviewer.login == 'ai-agent-net'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Test Gemini Review
        uses: Val-d-emar/ai-vps-reviewer@dev
        with:
          github_token: ${{ secrets.AI_AGENT_PAT }}
          vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
          vps_target: ${{ secrets.VPS_TARGET }}
          vps_users: ${{ vars.ALLOWED_USERS || github.repository_owner }}
          agent_model: "flash"
          review_language: "Russian"
          approval_required: false
          comment_title: "# 🤖 Gemini AI Code Review"
