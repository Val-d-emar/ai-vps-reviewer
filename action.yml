name: "AI VPS Reviewer"
description: "AI code review via remote VPS"
author: "Val-d-emar"

branding:
  icon: "code"
  color: "blue"
  
inputs:
  vps_ssh_key:
    description: "Private SSH key to access VPS"
    required: true
  vps_target:
    description: "SSH target (user@host)"
    required: true
  vps_users:
    description: "VPS users list (comma separated)"
    required: false
    default: ""
  agent_model:
    description: "Gemini model"
    required: false
    default: "flash"
  github_token:
    description: "GitHub PAT"
    required: false
    default: ${{ github.token }}
  review_prompt:
    description: "Custom prompt for the AI"
    required: false
    default: >
      You are an expert software engineer. Review this git diff for bugs, security, and style. 
      Provide feedback in Markdown. 
      IMPORTANT: Assume all infrastructure versions (like GitHub Actions @v4, @v6, etc.) are valid and exist; do not flag them as incorrect. 
      Focus strictly on the logic, security, and quality of the code changes.
      If okay, approve PR including the text 'RESUME: APPROVE' to end of your response.
  review_language:
    description: "Language for the AI"
    required: false
    default: "English"
  approval_required:
    description: "Require approval"
    required: false
    default: "false"
  comment_title:
    description: "Title for the comment"
    required: false
    default: "# 🤖 AI Code Review"

runs:

  using: "composite"
  steps:
    - name: Cleanup VPS Workspace on Close
      if: github.event.action == 'closed'
      env:
        SSH_KEY: ${{ inputs.vps_ssh_key }}
        SSH_TARGET: ${{ inputs.vps_target }}
      shell: bash
      run: |
        eval $(ssh-agent -s)
        echo "$SSH_KEY" | tr -d '\r' | ssh-add - > /dev/null 2>&1
        # Если PR закрыт, удаляем папку этого PR
        ssh -o StrictHostKeyChecking=no $SSH_TARGET "rm -rf ~/src/${{ github.repository }}/pr_${{ github.event.pull_request.number }}"
        ssh-agent -k > /dev/null 2>&1

    - name: Validate Access
      if: github.event.action != 'closed'
      id: validate
      env:
        ALLOWED_USERS: ${{ inputs.vps_users }}
        ACTOR: ${{ github.actor }}
      shell: bash
      run: |
        TRIMMED_USERS=$(echo "$ALLOWED_USERS" | tr -d ' ')
        if [[ ! ",$TRIMMED_USERS," =~ ",$ACTOR," ]]; then
          echo "Error: User $ACTOR not found in the allowed list: $ALLOWED_USERS"
          exit 1
        fi

    - name: Checkout Code
      id: checkout
      if: steps.validate.outcome == 'success'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.github_token }}

    - name: Generate PR Diff
      id: diff
      if: steps.checkout.outcome == 'success'
      shell: bash
      run: |
        if [ -z "${{ github.event.pull_request.number }}" ]; then
          echo "Error: This action only works on pull_request events."
          exit 1
        fi
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        git diff $BASE_SHA...$HEAD_SHA > pr_diff.txt

        if [ ! -s pr_diff.txt ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Run Gemini Review on VPS
      id: review
      if: steps.diff.outcome == 'success' && steps.diff.outputs.skip == 'false'
      shell: bash
      env:
        SSH_KEY: ${{ inputs.vps_ssh_key }}
        SSH_TARGET: ${{ inputs.vps_target }}
        PR_NUM: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        LANG_INPUT: ${{ inputs.review_language }}
        MODEL_INPUT: ${{ inputs.agent_model }}
        PROMPT_INPUT: ${{ inputs.review_prompt }}   
        TOKEN_INPUT: ${{ inputs.github_token }}
        IS_DEFAULT_TOKEN: ${{ inputs.github_token == github.token }}     
      run: |
        # 1. SSH Agent
        eval $(ssh-agent -s)
        echo "$SSH_KEY" | tr -d '\r' | ssh-add - > /dev/null 2>&1

        # 2. Подготовка аргументов
        # Кодируем в Base64 все текстовые поля, чтобы пробелы и спецсимволы 
        # не сломали передачу и не вызвали инъекций
        # Используем printf для надежной передачи строк в base64
        LANG_B64=$(printf "%s" "$LANG_INPUT" | base64 -w 0)
        MODEL_B64=$(printf "%s" "$MODEL_INPUT" | base64 -w 0)
        PROMPT_B64=$(printf "%s" "$PROMPT_INPUT" | base64 -w 0)

        # ЛОГИКА ТОКЕНА:
        if [ "$IS_DEFAULT_TOKEN" == "true" ]; then
          if [ -n "$TOKEN_INPUT" ]; then
            TOKEN_B64=$(printf "%s" "$TOKEN_INPUT" | base64 -w 0)
          else
            TOKEN_B64="EMPTY"
          fi
        else
          TOKEN_B64="EMPTY"
        fi

        echo "LANG_B64: $LANG_B64"
        echo "MODEL_B64: $MODEL_B64"
        echo "PROMPT_B64: $PROMPT_B64"
        echo "TOKEN_B64: $TOKEN_B64"
        
        # Используем printf %q для безопасного экранирования всех аргументов для удаленного шелла
        # REMOTE_CMD=$(printf "%q %q %q %q %q" "$PR_NUM" "$REPO" "$LANG_B64" "$MODEL_B64" "$PROMPT_B64" "$TOKEN_B64")
        REMOTE_CMD="$PR_NUM $REPO $LANG_B64 $MODEL_B64 $PROMPT_B64 $TOKEN_B64"

        # 3. Вызов VPS
        cat pr_diff.txt | ssh -o LogLevel=ERROR -o StrictHostKeyChecking=no $SSH_TARGET "$REMOTE_CMD" > raw_review.md || { echo "SSH Execution failed"; exit 1; }

        ssh-agent -k > /dev/null 2>&1

        # 4. Формируем результат
        printf "%s\n\n" "${{ inputs.comment_title }}" > review_result.md
        cat raw_review.md >> review_result.md

        # 5. Логика Approve
        if [ "${{ inputs.approval_required }}" == "true" ]; then
          grep -iq "RESUME: APPROVE" review_result.md && echo "APPROVE" > review_status.txt || echo "REJECT" > review_status.txt
        fi

    - name: Submit Feedback to PR
      if: steps.review.outcome == 'success' && steps.diff.outputs.skip == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        CURRENT_USER=$(gh api user -q .login 2>/dev/null || echo "github-actions[bot]")
        if [[ "$CURRENT_USER" == *"{"* ]]; then CURRENT_USER="github-actions[bot]"; fi

        if [ "${{ inputs.approval_required }}" == "true" ]; then
          RESUME=$(cat review_status.txt 2>/dev/null || echo "REJECT")
          if [ "$RESUME" == "APPROVE" ]; then
            gh pr review ${{ github.event.pull_request.number }} -R ${{ github.repository }} --approve --body-file review_result.md
          else
            gh pr review ${{ github.event.pull_request.number }} -R ${{ github.repository }} --request-changes --body-file review_result.md
          fi
        else
          COMMENT_ID=$(gh api --paginate repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments | \
            jq -r --arg u "$CURRENT_USER" --arg t "${{ inputs.comment_title }}" \
            '.[] | select(.user.login == $u and (.body | startswith($t))) | .id' | tail -1)
          
          if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
            gh api --method PATCH /repos/${{ github.repository }}/issues/comments/$COMMENT_ID -F body=@review_result.md
          else
            gh pr comment ${{ github.event.pull_request.number }} -R ${{ github.repository }} --body-file review_result.md
          fi
        fi
